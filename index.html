<!DOCTYPE html>
<html>
<head>
  <title>Shooting Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: linear-gradient(#111, #222);
    }

    #player {
      width: 50px;
      height: 50px;
      background: dodgerblue;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
    }

    .bullet {
      width: 6px;
      height: 18px;
      background: yellow;
      position: absolute;
      border-radius: 3px;
    }

    .enemy {
      width: 45px;
      height: 45px;
      background: crimson;
      position: absolute;
      border-radius: 50%;
    }

    #score {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 24px;
    }

    #gameOver {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 36px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="player"></div>

  <div id="gameOver">
    <div>Game Over</div>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<script>
  const game = document.getElementById("game");
  const player = document.getElementById("player");
  const scoreText = document.getElementById("score");
  const gameOverScreen = document.getElementById("gameOver");

  let playerX = window.innerWidth / 2 - 25;
  let bullets = [];
  let enemies = [];
  let score = 0;
  let gameOver = false;

  const keys = {};

  document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (e.key === " ") {
      shoot();
    }
  });

  document.addEventListener("keyup", e => {
    keys[e.key] = false;
  });

  function shoot() {
    if (gameOver) return;

    const bullet = document.createElement("div");
    bullet.className = "bullet";
    bullet.style.left = playerX + 22 + "px";
    bullet.style.top = window.innerHeight - 90 + "px";

    game.appendChild(bullet);
    bullets.push(bullet);
  }

  function createEnemy() {
    if (gameOver) return;

    const enemy = document.createElement("div");
    enemy.className = "enemy";
    enemy.style.left = Math.random() * (window.innerWidth - 45) + "px";
    enemy.style.top = "-50px";

    game.appendChild(enemy);
    enemies.push(enemy);
  }

  function movePlayer() {
    if (keys["ArrowLeft"] || keys["a"]) {
      playerX -= 7;
    }

    if (keys["ArrowRight"] || keys["d"]) {
      playerX += 7;
    }

    playerX = Math.max(0, Math.min(window.innerWidth - 50, playerX));
    player.style.left = playerX + "px";
  }

  function updateBullets() {
    bullets.forEach((bullet, index) => {
      let top = parseInt(bullet.style.top);
      bullet.style.top = top - 10 + "px";

      if (top < -20) {
        bullet.remove();
        bullets.splice(index, 1);
      }
    });
  }

  function updateEnemies() {
    enemies.forEach((enemy, index) => {
      let top = parseInt(enemy.style.top);
      enemy.style.top = top + 3 + "px";

      if (top > window.innerHeight) {
        endGame();
      }
    });
  }

  function checkCollisions() {
    bullets.forEach((bullet, bulletIndex) => {
      const b = bullet.getBoundingClientRect();

      enemies.forEach((enemy, enemyIndex) => {
        const e = enemy.getBoundingClientRect();

        if (
          b.left < e.right &&
          b.right > e.left &&
          b.top < e.bottom &&
          b.bottom > e.top
        ) {
          bullet.remove();
          enemy.remove();

          bullets.splice(bulletIndex, 1);
          enemies.splice(enemyIndex, 1);

          score++;
          scoreText.textContent = "Score: " + score;
        }
      });
    });
  }

  function endGame() {
    gameOver = true;
    gameOverScreen.style.display = "flex";
  }

  function gameLoop() {
    if (!gameOver) {
      movePlayer();
      updateBullets();
      updateEnemies();
      checkCollisions();
      requestAnimationFrame(gameLoop);
    }
  }

  setInterval(createEnemy, 1000);
  gameLoop();
</script>

</body>
</html>
